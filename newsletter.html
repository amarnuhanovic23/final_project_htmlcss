<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Raters Republic Newsletter</title>
        <link rel="stylesheet" href="css/news_style.css">
    </head>
    <body>

<section class="subscribe-section">
  <h2>Subscribe to Raters Republic</h2>
  <p>Get updates about new ratings and trending games.</p>

  <form action="https://formspree.io/f/maqaajya" method="POST">
    
    <label for="email">Email Address</label><br>
    <input type="email" id="email" name="email" placeholder="Enter your email" required>

    <br><br>

    <label for="name">Name (optional)</label><br>
    <input type="text" id="name" name="name" placeholder="Your name">

    <br><br>

    <!-- Optional hidden field to control message -->
    <input  name="_subject" value="New Newsletter Subscription!">

    <br><br>

    <input type="checkbox" required>
    <label for="agreement">I agree to receive emails from Raters Republic</label>

    <br><br>

    <button type="submit">Subscribe</button>

  </form>
</section>
